<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokasi & Peta - Woku Manado</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .map-container {
            width: 100%;
            height: 450px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin-bottom: 50px;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .restoran-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        .restoran-card {
            display: flex;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .restoran-img {
            width: 130px;
            min-height: 100%;
        }
        .restoran-img img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 0;
        }
        .restoran-info {
            padding: 20px;
            flex-grow: 1;
        }
        .restoran-info h3 { font-size: 1.1rem; margin-bottom: 5px; color: var(--primary); }
        body.dark-theme .restoran-info h3 { color: var(--accent); }
        .restoran-info p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; }
        .restoran-meta { font-size: 0.8rem; font-weight: 500; }
        .restoran-meta strong { display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-brand">Woku Manado</a>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Beranda</a>
                <a href="menu.html" class="nav-link">Kategori Menu</a>
                <a href="pesan.html" class="nav-link">Pesan Online</a>

                <a href="saran.html" class="nav-link">Saran</a>
                <a href="lokasi.html" class="nav-link active">Lokasi</a>
                <a href="tentang.html" class="nav-link">Tentang</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">◐</button>
                <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div class="section-header scroll-reveal">
                <h2>Lokasi Rumah Makan</h2>
                <p>Temukan kami dan mitra restoran kami di pusat kota Manado.</p>
                <div class="accent-line"></div>
            </div>

            
            <div class="map-container scroll-reveal">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d127641.13405799797!2d124.815228!3d1.4931089!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3287a4a9b6c03983%3A0x6bfa8a7f1a8e1df1!2sManado%2C%20North%20Sulawesi!5e0!3m2!1sen!2sid!4v1717643534888!5m2!1sen!2sid" allowfullscreen="" loading="lazy"></iframe>
            </div>

            <h3 style="margin-bottom: 25px; font-size: 1.5rem;" class="scroll-reveal">Rekomendasi Restoran Kuliner Manado</h3>
            <div class="restoran-grid scroll-reveal" id="restoranGrid">
                
                <p style="color: var(--text-muted);">Memuat data...</p>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container"><div class="footer-bottom"><p>&copy; 2026 Woku Manado.</p></div></div>
    </footer>

    <script src="js/navbar.js"></script>
    <script src="js/animasi.js"></script>
    <script src="js/data_restoran.js?v=3"></script>
    <script src="js/lokasi.js?v=3"></script>
</body>
</html>
